<!DOCTYPE html>
<html lang="kk">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Байланыс | Contact</title>

    <meta name="description" content="Бізбен байланысу беті. Сұрақтарыңыз бен ұсыныстарыңызды жіберіңіз.">
    <meta name="keywords" content="байланыс, contact, сұрақ, ұсыныс">

    <link rel="stylesheet" href="../assets/css/style.css">

</head>


<body>


<header>

<nav>

<a href="../index.html">
Басты бет
</a>

<a href="blog.html">
Блог
</a>

<a href="contact.html">
Байланыс
</a>

</nav>

</header>



<main>


<section class="contact-header">

<h1>📩 Бізбен байланысыңыз</h1>

<p>
Сұрақтарыңыз болса немесе ұсыныс жібергіңіз келсе, төмендегі форманы толтырыңыз.
</p>

</section>




<section class="contact-form">


<form action="#" method="post">


<label for="name">
Атыңыз:
</label>

<input 
type="text"
id="name"
name="name"
placeholder="Атыңызды енгізіңіз"
required>



<label for="email">
Email:
</label>

<input
type="email"
id="email"
name="email"
placeholder="email@example.com"
required>



<label for="message">
Хабарлама:
</label>

<textarea
id="message"
name="message"
rows="6"
placeholder="Хабарламаңызды жазыңыз"
required></textarea>



<button type="submit">
Жіберу
</button>


</form>


</section>




<section class="contact-info">


<h2>Байланыс ақпараттары</h2>


<ul>

<li>📧 Email: info@example.com</li>

<li>🌐 Website: example.com</li>

<li>🕒 Жұмыс уақыты: 09:00 - 18:00</li>

</ul>


</section>



</main>




<footer>

<p>
© 2026 Blog. Барлық құқықтар қорғалған.
</p>

</footer>



</body>

</html>
